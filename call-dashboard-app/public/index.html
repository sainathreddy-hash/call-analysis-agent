<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stable Money — Call Insights v2</title>
<style>
  :root {
    --bg: #0F172A; --card: #1E293B; --card2: #334155;
    --text: #E2E8F0; --muted: #94A3B8; --accent: #3B82F6;
    --green: #22C55E; --red: #EF4444; --yellow: #F59E0B;
    --purple: #A78BFA; --cyan: #06B6D4; --emerald: #10B981;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  /* Header */
  .header { padding: 20px 32px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Tabs */
  .main-tabs { display: flex; gap: 2px; }
  .main-tab { background: none; border: none; color: var(--muted); padding: 8px 18px; cursor: pointer; font-size: 13px; border-radius: 6px; font-weight: 500; }
  .main-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .main-tab.active { background: var(--accent); color: white; font-weight: 600; }

  /* Layout */
  .layout { display: flex; height: calc(100vh - 65px); }
  .sidebar { width: 280px; border-right: 1px solid #334155; overflow-y: auto; flex-shrink: 0; }
  .main-content { flex: 1; overflow-y: auto; padding: 24px 32px; }
  .full-content { height: calc(100vh - 65px); overflow-y: auto; padding: 24px 32px; }

  /* Sidebar */
  .sidebar-section { padding: 12px 16px; border-bottom: 1px solid #1E293B; }
  .sidebar-section h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; font-weight: 700; }
  .search-box { width: 100%; background: var(--card); border: 1px solid #334155; color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 13px; outline: none; }
  .search-box:focus { border-color: var(--accent); }
  .product-btn { width: 100%; text-align: left; background: none; border: none; color: var(--text); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
  .product-btn:hover { background: var(--card); }
  .product-btn.active { background: var(--accent); color: white; }
  .badge { font-size: 10px; background: #334155; padding: 2px 8px; border-radius: 10px; color: var(--muted); }
  .product-btn.active .badge { background: rgba(255,255,255,0.2); color: white; }
  .sub-btn { width: 100%; text-align: left; background: none; border: none; color: var(--muted); padding: 5px 12px 5px 24px; cursor: pointer; font-size: 12px; display: flex; justify-content: space-between; border-radius: 4px; }
  .sub-btn:hover { background: var(--card); color: var(--text); }
  .sub-btn.active { color: var(--accent); background: rgba(59,130,246,0.1); }

  /* Sentiment filter */
  .sentiment-pills { display: flex; gap: 4px; flex-wrap: wrap; }
  .sent-pill { font-size: 11px; padding: 4px 10px; border-radius: 12px; cursor: pointer; border: 1px solid #334155; background: none; color: var(--muted); }
  .sent-pill:hover { border-color: var(--accent); color: var(--text); }
  .sent-pill.active { border-color: transparent; color: #0F172A; font-weight: 700; }

  /* KPI cards */
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .kpi { background: var(--card); padding: 16px; border-radius: 8px; border-left: 3px solid var(--accent); }
  .kpi .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi .value { font-size: 26px; font-weight: 700; margin-top: 4px; }
  .kpi .detail { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Sentiment donut */
  .sentiment-bar { display: flex; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
  .sentiment-bar div { transition: width 0.3s; }
  .sentiment-legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 11px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }

  /* Product grid */
  .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .product-card { background: var(--card); border-radius: 8px; padding: 20px; border-left: 4px solid var(--accent); }
  .bar-row { margin-bottom: 10px; }
  .bar-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; }
  .bar-bg { width: 100%; height: 5px; background: #334155; border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }

  /* Call list */
  .call-list { display: flex; flex-direction: column; gap: 6px; }
  .call-item { background: var(--card); border-radius: 8px; padding: 14px 18px; cursor: pointer; border-left: 4px solid transparent; transition: all 0.15s; }
  .call-item:hover { background: #253347; }
  .call-item.selected { border-left-color: var(--accent); background: #1a2d47; }
  .call-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .cat-tag { font-size: 11px; background: rgba(59,130,246,0.12); color: var(--accent); padding: 2px 10px; border-radius: 10px; font-weight: 600; }
  .sent-tag { font-size: 10px; padding: 2px 8px; border-radius: 8px; font-weight: 700; }
  .call-summary { font-size: 13px; color: #CBD5E1; line-height: 1.5; }
  .call-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .chip { font-size: 10px; padding: 2px 7px; border-radius: 6px; font-weight: 600; }
  .chip-action { background: rgba(34,197,94,0.12); color: var(--green); }
  .chip-pain { background: rgba(239,68,68,0.12); color: var(--red); }

  /* Pagination */
  .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 16px; align-items: center; }
  .pagination button { background: var(--card); border: 1px solid #334155; color: var(--text); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
  .pag-info { font-size: 12px; color: var(--muted); }

  /* Detail Panel */
  .detail-overlay { position: fixed; top: 0; right: 0; width: 58%; height: 100vh; background: var(--bg); border-left: 1px solid #334155; z-index: 100; overflow-y: auto; transform: translateX(100%); transition: transform 0.25s ease; box-shadow: -8px 0 30px rgba(0,0,0,0.4); }
  .detail-overlay.open { transform: translateX(0); }
  .detail-header { padding: 16px 24px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 2; }
  .close-btn { background: var(--card); border: none; color: var(--text); width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-size: 18px; }
  .close-btn:hover { background: var(--red); }
  .detail-body { padding: 20px 24px; }

  /* Detail sections */
  .d-section { background: var(--card); border-radius: 8px; padding: 18px; margin-bottom: 16px; }
  .d-section h4 { font-size: 10px; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; margin-bottom: 10px; font-weight: 700; }
  .d-row { display: flex; gap: 10px; margin-bottom: 8px; }
  .d-label { font-size: 12px; color: var(--muted); min-width: 90px; }
  .d-value { font-size: 13px; color: var(--text); }
  .reason-box { background: #0F172A; padding: 10px 14px; border-radius: 6px; font-size: 12px; color: #CBD5E1; line-height: 1.5; border-left: 3px solid var(--purple); margin-top: 6px; }
  .action-grid { display: flex; gap: 10px; flex-wrap: wrap; }
  .action-card { background: #0F172A; padding: 10px 14px; border-radius: 6px; flex: 1; min-width: 180px; }
  .action-name { font-size: 12px; font-weight: 700; color: var(--green); margin-bottom: 3px; }
  .action-reason { font-size: 11px; color: var(--muted); }

  /* Transcript */
  .transcript-line { margin-bottom: 10px; padding: 8px 12px; border-radius: 6px; font-size: 13px; line-height: 1.6; }
  .transcript-line.sp-0 { background: rgba(59,130,246,0.06); border-left: 3px solid var(--accent); }
  .transcript-line.sp-1 { background: rgba(167,139,250,0.06); border-left: 3px solid var(--purple); }
  .sp-label { font-size: 10px; font-weight: 700; margin-bottom: 3px; }
  .sp-label.agent { color: var(--accent); }
  .sp-label.customer { color: var(--purple); }
  .highlight { background: rgba(250,204,21,0.15); padding: 1px 3px; border-radius: 2px; }

  /* Stories */
  .story-card { background: var(--card); border-radius: 8px; padding: 24px; margin-bottom: 16px; border-left: 4px solid var(--purple); cursor: pointer; }
  .story-card:hover { background: #253347; }
  .story-quote { font-style: italic; color: #CBD5E1; font-size: 14px; line-height: 1.6; margin: 12px 0; padding: 12px 16px; background: #0F172A; border-radius: 6px; border-left: 3px solid var(--muted); }

  /* Loading */
  .loading { text-align: center; padding: 60px; color: var(--muted); }
  .spinner { width: 28px; height: 28px; border: 3px solid #334155; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Product deep dive */
  .pdp-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(480px, 1fr)); gap: 20px; margin-bottom: 24px; }
  .pdp-card { background: var(--card); border-radius: 10px; padding: 24px; }
  .pdp-card h3 { font-size: 17px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .pdp-stat { display: inline-flex; align-items: baseline; gap: 4px; margin-right: 16px; font-size: 12px; color: var(--muted); }
  .pdp-stat .num { font-size: 20px; font-weight: 700; color: var(--text); }
  .issue-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; cursor: pointer; padding: 6px 10px; border-radius: 6px; }
  .issue-row:hover { background: rgba(255,255,255,0.03); }
  .issue-name { flex: 1; color: var(--text); }
  .issue-count { color: var(--muted); min-width: 40px; text-align: right; }
  .issue-pct { color: var(--muted); min-width: 36px; text-align: right; font-size: 11px; }
  .issue-bar { flex: 0 0 100px; height: 4px; background: #334155; border-radius: 2px; overflow: hidden; }
  .issue-bar-fill { height: 100%; border-radius: 2px; }
  .action-stat { display: flex; justify-content: space-between; font-size: 12px; padding: 5px 0; border-bottom: 1px solid #1E293B; }
  .action-stat:last-child { border-bottom: none; }

  /* Users & Escalations */
  .user-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .caller-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .caller-table th { text-align: left; padding: 8px 10px; background: #0F172A; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; }
  .caller-table td { padding: 8px 10px; border-bottom: 1px solid #1E293B; }
  .caller-table tr:hover td { background: rgba(255,255,255,0.02); }
  .esc-card { background: var(--card); border-radius: 8px; padding: 20px; }
  .region-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
  .region-name { min-width: 80px; color: var(--text); }
  .region-bar { flex: 1; height: 6px; background: #334155; border-radius: 3px; overflow: hidden; display: flex; }

  /* Curated Stories */
  .curated-card { background: var(--card); border-radius: 10px; padding: 24px; margin-bottom: 20px; border-left: 5px solid var(--purple); position: relative; }
  .curated-card:hover { background: #253347; }
  .curated-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .curated-meta { font-size: 11px; color: var(--muted); margin-bottom: 12px; display: flex; gap: 12px; flex-wrap: wrap; }
  .curated-meta span { display: inline-flex; align-items: center; gap: 4px; }
  .curated-story { font-size: 13px; color: #CBD5E1; line-height: 1.7; margin-bottom: 16px; padding: 14px 16px; background: #0F172A; border-radius: 8px; border-left: 3px solid var(--muted); }
  .curated-section { margin-bottom: 14px; }
  .curated-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .root-cause { font-size: 12px; color: var(--yellow); line-height: 1.6; padding: 12px 14px; background: rgba(245,158,11,0.06); border-radius: 6px; border-left: 3px solid var(--yellow); }
  .fix-box { font-size: 12px; color: var(--green); line-height: 1.6; padding: 12px 14px; background: rgba(34,197,94,0.06); border-radius: 6px; border-left: 3px solid var(--green); }

  /* Mixpanel Flow */
  .mp-flow { display: flex; flex-direction: column; gap: 0; position: relative; padding-left: 16px; }
  .mp-flow::before { content: ''; position: absolute; left: 7px; top: 8px; bottom: 8px; width: 2px; background: linear-gradient(to bottom, var(--accent), var(--purple), var(--red)); border-radius: 1px; }
  .mp-step { display: flex; align-items: flex-start; gap: 12px; padding: 6px 0; position: relative; }
  .mp-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); flex-shrink: 0; margin-top: 2px; z-index: 1; margin-left: -16px; }
  .mp-step:last-child .mp-dot { background: var(--red); }
  .mp-step:first-child .mp-dot { background: var(--green); }
  .mp-event { font-family: 'SF Mono', 'Consolas', monospace; font-size: 11px; color: var(--cyan); background: rgba(6,182,212,0.08); padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
  .mp-note { font-size: 11px; color: var(--muted); margin-left: 4px; }
  .curated-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 12px; }
  .curated-tag { font-size: 10px; padding: 3px 8px; border-radius: 10px; background: rgba(167,139,250,0.12); color: var(--purple); font-weight: 600; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Call Insights Dashboard</h1>
    <div class="sub">Stable Money | <span id="total-count">...</span> calls analyzed with sentiment</div>
  </div>
  <div class="main-tabs">
    <button class="main-tab active" onclick="switchTab('overview',this)">Overview</button>
    <button class="main-tab" onclick="switchTab('products',this)">Products</button>
    <button class="main-tab" onclick="switchTab('users',this)">Users & Escalations</button>
    <button class="main-tab" onclick="switchTab('sentiment',this)">Sentiment Deep-Dive</button>
    <button class="main-tab" onclick="switchTab('techissues',this)">Tech Issues</button>
    <button class="main-tab" onclick="switchTab('escalations2',this)">Escalations</button>
    <button class="main-tab" onclick="switchTab('intent',this)">User Intent</button>
    <button class="main-tab" onclick="switchTab('calls',this)">Browse Calls</button>
    <button class="main-tab" onclick="switchTab('stories',this)">User Stories</button>
    <button class="main-tab" onclick="switchTab('advanced',this)">Advanced Insights</button>
  </div>
</div>

<!-- ═══ OVERVIEW ═══ -->
<div id="tab-overview" class="full-content"></div>

<!-- ═══ CALLS ═══ -->
<div id="tab-calls" style="display:none;">
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-section">
        <input type="text" class="search-box" placeholder="Search transcripts..." id="search-input" oninput="debounceSearch()">
      </div>
      <div class="sidebar-section">
        <h3>Sentiment</h3>
        <div class="sentiment-pills" id="sentiment-pills"></div>
      </div>
      <div class="sidebar-section">
        <h3>Products</h3>
        <button class="product-btn active" onclick="filterProduct(null,this)"><span>All</span><span class="badge" id="count-all">—</span></button>
        <div id="product-list"></div>
      </div>
    </div>
    <div class="main-content">
      <div class="kpi-row" id="filter-kpis"></div>
      <div class="call-list" id="call-list"><div class="loading"><div class="spinner"></div>Loading...</div></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</div>

<!-- ═══ PRODUCTS ═══ -->
<div id="tab-products" class="full-content" style="display:none;"></div>

<!-- ═══ USERS & ESCALATIONS ═══ -->
<div id="tab-users" class="full-content" style="display:none;"></div>

<!-- ═══ SENTIMENT DEEP-DIVE ═══ -->
<div id="tab-sentiment" class="full-content" style="display:none;"></div>

<!-- ═══ TECH ISSUES ═══ -->
<div id="tab-techissues" class="full-content" style="display:none;"></div>

<!-- ═══ ESCALATIONS ENHANCED ═══ -->
<div id="tab-escalations2" class="full-content" style="display:none;"></div>

<!-- ═══ USER INTENT ═══ -->
<div id="tab-intent" class="full-content" style="display:none;"></div>

<!-- ═══ STORIES ═══ -->
<div id="tab-stories" class="full-content" style="display:none;"></div>

<!-- ═══ ADVANCED INSIGHTS ═══ -->
<div id="tab-advanced" class="full-content" style="display:none;"></div>

<!-- ═══ DETAIL PANEL ═══ -->
<div class="detail-overlay" id="detail-panel">
  <div class="detail-header">
    <div>
      <div style="font-size:15px;font-weight:700;" id="detail-title"></div>
      <div style="font-size:11px;color:var(--muted);margin-top:3px;" id="detail-meta"></div>
    </div>
    <button class="close-btn" onclick="closeDetail()">×</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<script>
let stats=null, stories=[], curatedStories=[], userStats=null, escalationData=null, regionData=[], sentimentDD=null, advInsights=null, techIssues=null, enhancedEsc=null, intentSeg=null, langBreakdown=null, currentProduct=null, currentCategory=null, currentSentiment=null, currentPage=1, searchTimeout=null;

const COLORS = {"Credit Card":"#3B82F6","Bonds":"#A78BFA","FD":"#06B6D4","Mutual Fund":"#10B981","General":"#F59E0B","KYC/Onboarding":"#EF4444"};
const SENT_COLORS = {Angry:"#EF4444",Frustrated:"#F59E0B",Confused:"#A78BFA",Neutral:"#64748B",Satisfied:"#22C55E"};

// ─── Init ───
async function init() {
  const _nc = '?_t=' + Date.now();
  [stats, stories, curatedStories, userStats, escalationData, regionData, sentimentDD, advInsights, techIssues, enhancedEsc, intentSeg, langBreakdown] = await Promise.all([
    fetch('/api/stats'+_nc).then(r=>r.json()),
    fetch('/api/stories'+_nc).then(r=>r.json()),
    fetch('/api/curated-stories'+_nc).then(r=>r.json()),
    fetch('/api/users'+_nc).then(r=>r.json()),
    fetch('/api/escalations'+_nc).then(r=>r.json()),
    fetch('/api/regions'+_nc).then(r=>r.json()),
    fetch('/api/sentiment-deep-dive'+_nc).then(r=>r.json()),
    fetch('/api/advanced-insights'+_nc).then(r=>r.json()),
    fetch('/api/tech-issues'+_nc).then(r=>r.json()),
    fetch('/api/enhanced-escalations'+_nc).then(r=>r.json()),
    fetch('/api/intent-segmentation'+_nc).then(r=>r.json()),
    fetch('/api/language-breakdown'+_nc).then(r=>r.json()),
  ]);
  console.log('Data loaded. techIssues keys:', Object.keys(techIssues), 'byIssueBucket:', (techIssues.byIssueBucket||[]).length);
  document.getElementById('total-count').textContent = stats.totalCalls.toLocaleString();
  renderOverview();
  buildSidebar();
  loadCalls();
}

function switchTab(tab, btn) {
  document.querySelectorAll('.main-tab').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  ['overview','calls','stories','products','users','sentiment','advanced','techissues','escalations2','intent'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab ? 'block' : 'none';
  });
  if (tab==='stories') renderStories();
  if (tab==='products') renderProducts();
  if (tab==='users') renderUsers();
  if (tab==='sentiment') renderSentimentDeepDive();
  if (tab==='advanced') renderAdvancedInsights();
  if (tab==='techissues') renderTechIssues();
  if (tab==='escalations2') renderEnhancedEscalations();
  if (tab==='intent') renderIntentSegmentation();
}

// ─── OVERVIEW ───
function renderOverview() {
  const el = document.getElementById('tab-overview');
  const total = stats.totalCalls;
  const s = stats.sentiments;
  let totalDur=0, resolved=0;
  for(const p of Object.values(stats.products)) {
    totalDur += p.totalDur;
    resolved += p.agentActions['Resolved on Call']||0;
  }
  const avgDur = Math.round(totalDur/total/60*10)/10;

  // Sentiment bar
  const sentBar = Object.entries(s).map(([k,v])=>`<div style="width:${v/total*100}%;background:${SENT_COLORS[k]}"></div>`).join('');
  const sentLegend = Object.entries(s).map(([k,v])=>`<span><span class="legend-dot" style="background:${SENT_COLORS[k]}"></span>${k}: ${v} (${Math.round(v/total*100)}%)</span>`).join('');

  // Product cards
  let productHTML = '';
  for(const [name,p] of Object.entries(stats.products).sort((a,b)=>b[1].total-a[1].total)) {
    const color = COLORS[name]||'var(--muted)';
    const subs = Object.entries(p.subcategories).sort((a,b)=>b[1].count-a[1].count);
    const topActions = Object.entries(p.agentActions).sort((a,b)=>b[1]-a[1]).slice(0,4);
    const pSentBar = Object.entries(p.sentiments).map(([k,v])=>`<div style="width:${v/p.total*100}%;background:${SENT_COLORS[k]}"></div>`).join('');

    productHTML += `
    <div class="product-card" style="border-left-color:${color}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 style="font-size:16px;font-weight:700;">${name}</h3>

}

function renderLanguageSection() {
  if (!langBreakdown || !langBreakdown.distribution || langBreakdown.distribution.length === 0) return '';
  const lb = langBreakdown;
  const LANG_COLORS = { Hindi: '#F59E0B', Hinglish: '#A78BFA', English: '#3B82F6', Unknown: '#64748B' };
  const LANG_ICONS = { Hindi: '\u0939\u093F', Hinglish: 'Hi\u0939', English: 'En', Unknown: '?' };
  const maxCount = lb.distribution[0]?.count || 1;

  // Language distribution bars
  const distHTML = lb.distribution.map(d => {
    const color = LANG_COLORS[d.language] || '#64748B';
    const icon = LANG_ICONS[d.language] || '?';
    const sentDots = Object.entries(d.sentiments || {}).filter(([,v]) => v > 0).sort((a,b) => b[1] - a[1]).slice(0, 3).map(([k,v]) => {
      const sc = {Angry:'#EF4444',Frustrated:'#F59E0B',Confused:'#A78BFA',Neutral:'#64748B',Satisfied:'#22C55E'}[k] || '#64748B';
      return '<span style="color:' + sc + ';font-size:10px;margin-left:4px;" title="' + k + ': ' + v + '">' + Math.round(v / d.count * 100) + '% ' + k.slice(0,3) + '</span>';
    }).join('');

    return '<div style="background:var(--card);border-radius:8px;padding:14px 18px;border-left:3px solid ' + color + ';">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">' +
        '<div style="display:flex;align-items:center;gap:8px;">' +
          '<span style="background:' + color + '22;color:' + color + ';padding:4px 8px;border-radius:4px;font-weight:700;font-size:13px;">' + icon + '</span>' +
          '<span style="font-weight:600;font-size:15px;">' + d.language + '</span>' +
        '</div>' +
        '<span style="font-size:22px;font-weight:700;color:' + color + ';">' + d.count.toLocaleString() + '</span>' +
      '</div>' +
      '<div class="bar-bg"><div class="bar-fill" style="width:' + (d.count / maxCount * 100) + '%;background:' + color + ';"></div></div>' +
      '<div style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--muted);">' +
        '<span>' + d.percentage + '% of calls</span>' +
        '<span>Avg ' + d.avgDurationMin + ' min</span>' +
        '<span style="color:' + (d.frustrationRate > 25 ? '#EF4444' : d.frustrationRate > 15 ? '#F59E0B' : '#22C55E') + ';">' + d.frustrationRate + '% frustrated' + sentDots + '</span>' +
      '</div>' +
    '</div>';
  }).join('');

  // Product × Language mini matrix
  const langs = lb.allLanguages || [];
  let matrixHTML = '';
  if (lb.productLangMatrix && lb.productLangMatrix.length > 0) {
    const headerCells = langs.map(l => '<th style="padding:6px 10px;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:' + (LANG_COLORS[l] || 'var(--muted)') + ';">' + l + '</th>').join('');
    const rows = lb.productLangMatrix.map(row => {
      const prodColor = COLORS[row.product] || 'var(--muted)';
      const prodTotal = langs.reduce((s, l) => s + (row[l] || 0), 0);
      const cells = langs.map(l => {
        const v = row[l] || 0;
        const pct = prodTotal > 0 ? Math.round(v / prodTotal * 100) : 0;
        const bg = v > 0 ? (LANG_COLORS[l] || '#64748B') + (pct > 50 ? '44' : pct > 20 ? '22' : '11') : 'transparent';
        return '<td style="padding:6px 10px;text-align:center;font-size:12px;background:' + bg + ';">' + (v > 0 ? v + ' <span style="color:var(--muted);font-size:10px;">(' + pct + '%)</span>' : '<span style="color:#334155;">-</span>') + '</td>';
      }).join('');
      return '<tr><td style="padding:6px 10px;font-weight:600;font-size:12px;color:' + prodColor + ';">' + row.product + '</td>' + cells + '</tr>';
    }).join('');
    matrixHTML = '<div style="margin-top:20px;">' +
      '<div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">Product × Customer Language</div>' +
      '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;background:var(--card);border-radius:8px;overflow:hidden;">' +
        '<thead><tr style="border-bottom:1px solid #334155;"><th style="padding:6px 10px;text-align:left;font-size:10px;color:var(--muted);">Product</th>' + headerCells + '</tr></thead>' +
        '<tbody>' + rows + '</tbody></table></div></div>';
  }

  return '<div style="margin-top:24px;">' +
    '<div style="font-size:16px;font-weight:700;margin-bottom:16px;">Customer Language Preference <span style="font-size:12px;color:var(--muted);font-weight:400;">(detected from customer speech segments)</span></div>' +
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;">' + distHTML + '</div>' +
    matrixHTML +
  '</div>';
}

// ─── SIDEBAR ───
function buildSidebar() {
  document.getElementById('count-all').textContent = stats.totalCalls;

  // Sentiment pills
  document.getElementById('sentiment-pills').innerHTML = `
    <button class="sent-pill" onclick="filterSentiment(null,this)">All</button>
    ${Object.entries(stats.sentiments).map(([k,v])=>`<button class="sent-pill" style="border-color:${SENT_COLORS[k]}30" onclick="filterSentiment('${k}',this)">${k} <span style="opacity:0.6">${v}</span></button>`).join('')}
  `;

  let html='';
  for(const [name,p] of Object.entries(stats.products).sort((a,b)=>b[1].total-a[1].total)) {
    const subs = Object.entries(p.subcategories).sort((a,b)=>b[1].count-a[1].count);
    const color = COLORS[name]||'var(--muted)';
    html += `
      <button class="product-btn" onclick="filterProduct('${name}',this)">
        <span style="display:flex;align-items:center;gap:6px;"><span style="width:8px;height:8px;border-radius:50%;background:${color};display:inline-block;"></span>${name}</span>
        <span class="badge">${p.total}</span>
      </button>
      <div class="sub-list" data-product="${name}" style="display:none;">
        ${subs.map(([sub,s])=>`<button class="sub-btn" onclick="filterCategory('${sub.replace(/'/g,"\\'")}',this)" data-sub="${sub}"><span>${sub}</span><span style="color:var(--muted)">${s.count}</span></button>`).join('')}
      </div>
    `;
  }
  document.getElementById('product-list').innerHTML = html;
}

// ─── FILTERS ───
function filterProduct(product,btn) {
  currentProduct=product; currentCategory=null; currentPage=1;
  document.querySelectorAll('.product-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else if(!product) document.querySelector('.product-btn').classList.add('active');
  else document.querySelectorAll('.product-btn').forEach(b=>{ if(b.textContent.includes(product)) b.classList.add('active'); });
  document.querySelectorAll('.sub-list').forEach(s=>s.style.display=s.dataset.product===product?'block':'none');
  document.querySelectorAll('.sub-btn').forEach(b=>b.classList.remove('active'));
  loadCalls();
}
function filterCategory(cat,btn) { currentCategory=cat; currentPage=1; document.querySelectorAll('.sub-btn').forEach(b=>b.classList.remove('active')); if(btn)btn.classList.add('active'); loadCalls(); }
function filterSentiment(sent,btn) { currentSentiment=sent; currentPage=1; document.querySelectorAll('.sent-pill').forEach(b=>b.classList.remove('active')); if(btn)btn.classList.add('active'); loadCalls(); }
function debounceSearch() { clearTimeout(searchTimeout); searchTimeout=setTimeout(()=>{currentPage=1;loadCalls();},400); }

// ─── CALL LIST ───
async function loadCalls() {
  const search = document.getElementById('search-input')?.value||'';
  const params = new URLSearchParams({page:currentPage,limit:50});
  if(currentProduct) params.set('product',currentProduct);
  if(currentCategory) params.set('category',currentCategory);
  if(currentSentiment) params.set('sentiment',currentSentiment);
  if(search) params.set('search',search);

  const res = await fetch(`/api/calls?${params}`).then(r=>r.json());

  document.getElementById('filter-kpis').innerHTML = `
    <div class="kpi" style="border-left-color:var(--accent);padding:10px 14px;"><div class="label">Showing</div><div class="value" style="font-size:20px;">${res.total.toLocaleString()}</div><div class="detail">${currentProduct||'All'} ${currentCategory?'→ '+currentCategory:''} ${currentSentiment?'('+currentSentiment+')':''}</div></div>
  `;

  if(!res.calls.length) {
    document.getElementById('call-list').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">No calls match</div>';
    document.getElementById('pagination').innerHTML=''; return;
  }

  document.getElementById('call-list').innerHTML = res.calls.map(c=>`
    <div class="call-item" onclick="openDetail('${c.call_sid}')" id="item-${c.call_sid}">
      <div class="call-row">
        <span class="cat-tag">${c.category}</span>
        <div style="display:flex;gap:6px;align-items:center;">
          <span class="sent-tag" style="background:${c.sentimentAnalysis.sentimentColor}20;color:${c.sentimentAnalysis.sentimentColor}">${c.sentimentAnalysis.sentiment}</span>
          <span style="font-size:11px;color:var(--muted)">${c.durationMin}m</span>
        </div>
      </div>
      <div class="call-summary">${c.summary}</div>
      <div class="call-tags">
        ${c.agentActions.map(a=>`<span class="chip chip-action">${a.action}</span>`).join('')}
        ${c.painSignals.map(p=>`<span class="chip chip-pain">${p.signal}</span>`).join('')}
      </div>
    </div>
  `).join('');

  document.getElementById('pagination').innerHTML = `
    <button onclick="currentPage--;loadCalls();" ${res.page<=1?'disabled':''}>← Prev</button>
    <span class="pag-info">Page ${res.page}/${res.pages} (${res.total} calls)</span>
    <button onclick="currentPage++;loadCalls();" ${res.page>=res.pages?'disabled':''}>Next →</button>
  `;
}

// ─── CALL DETAIL ───
async function openDetail(sid) {

  document.querySelectorAll('.call-item').forEach(i=>i.classList.remove('selected'));

  document.getElementById('detail-body').innerHTML='<div class="loading"><div class="spinner"></div>Loading...</div>';

  const c = await fetch(`/api/call/${sid}`).then(r=>r.json());
  const lines = parseTranscript(c.transcript);
  const sa = c.sentimentAnalysis;

  document.getElementById('detail-title').textContent = `${c.product} → ${c.category}`;
  document.getElementById('detail-meta').textContent = `${c.call_sid} | ${c.durationMin}m | ${c.direction||''} | ${c.startTime||''}`;

  document.getElementById('detail-body').innerHTML = `
    <!-- Summary -->
    <div class="d-section" style="border-left:4px solid var(--emerald)">

    </div>

    <!-- Sentiment -->
    <div class="d-section" style="border-left:4px solid ${sa.sentimentColor}">
      <h4>Sentiment Analysis</h4>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
        <span style="font-size:20px;font-weight:700;color:${sa.sentimentColor}">${sa.sentiment}</span>

      </div>
      <div style="display:flex;gap:16px;font-size:12px;color:var(--muted);">
        ${Object.entries(sa.signals).filter(([,v])=>v>0).map(([k,v])=>`<span><span style="color:${SENT_COLORS[k[0].toUpperCase()+k.slice(1)]||'var(--muted)'}">${k}</span>: ${v}</span>`).join('')}
      </div>
      ${sa.tonality ? `<div style="margin-top:12px;padding-top:12px;border-top:1px solid #334155;">
        <div style="display:flex;gap:20px;font-size:12px;">
          <div><span style="color:var(--muted)">Customer tone:</span> <span style="font-weight:700;text-transform:capitalize;color:${sa.tonality.customerTone==='aggressive'?'var(--red)':sa.tonality.customerTone==='pleading'?'var(--yellow)':'var(--text)'}">${sa.tonality.customerTone||'neutral'}</span></div>
          <div><span style="color:var(--muted)">Agent tone:</span> <span style="font-weight:700;text-transform:capitalize;color:${sa.tonality.agentTone==='defensive'?'var(--red)':sa.tonality.agentTone==='robotic'?'var(--yellow)':'var(--text)'}">${sa.tonality.agentTone||'neutral'}</span></div>

// ─── SENTIMENT DEEP-DIVE ───
function renderSentimentDeepDive() {
  if (!sentimentDD || !sentimentDD.totalCalls) return;
  const el = document.getElementById('tab-sentiment');
  const d = sentimentDD;
  const total = d.totalCalls;

  // Sentiment distribution bar
  const sentOrder = ['Angry','Frustrated','Confused','Neutral','Satisfied'];
  const sentBarHTML = sentOrder.map(s => {
    const pct = d.sentimentDist[s] / total * 100;
    return pct > 0 ? `<div style="width:${pct}%;background:${SENT_COLORS[s]}" title="${s}: ${d.sentimentDist[s]} (${Math.round(pct)}%)"></div>` : '';
  }).join('');
  const sentLegendHTML = sentOrder.map(s =>
    `<span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;"><span class="legend-dot" style="background:${SENT_COLORS[s]}"></span>${s}: <b>${d.sentimentDist[s]}</b> (${Math.round(d.sentimentDist[s]/total*100)}%)</span>`
  ).join('');

  // Product frustration cards
  const prodFrustHTML = d.productFrustration.map(p => {
    const c = COLORS[p.product] || 'var(--muted)';
    return `<div style="background:var(--card);border-radius:8px;padding:16px;border-top:3px solid ${c}">
      <div style="font-size:14px;font-weight:700;margin-bottom:4px;">${p.product}</div>
      <div style="font-size:28px;font-weight:800;color:${p.pct > 25 ? 'var(--red)' : p.pct > 15 ? 'var(--yellow)' : 'var(--text)'};">${p.pct}%</div>
      <div style="font-size:11px;color:var(--muted);">frustrated + angry (${p.frustrated + p.angry} of ${p.total})</div>
      <div style="display:flex;gap:4px;margin-top:6px;">
        <div style="background:var(--red);border-radius:3px;height:4px;width:${p.angry/p.total*100}%;"></div>
        <div style="background:var(--yellow);border-radius:3px;height:4px;width:${p.frustrated/p.total*100}%;"></div>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:4px;display:flex;gap:8px;">
        <span><span style="color:var(--red)">■</span> Angry: ${p.angry}</span>
        <span><span style="color:var(--yellow)">■</span> Frustrated: ${p.frustrated}</span>
      </div>
    </div>`;
  }).join('');

  // Duration vs sentiment
  const durHTML = Object.entries(d.sentimentByDuration).map(([bucket, v]) => {
    if (v.total === 0) return '';
    const angryPct = v.angry / v.total * 100;
    const frustPct = v.frustrated / v.total * 100;
    const satPct = v.satisfied / v.total * 100;
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;">
      <div style="min-width:70px;color:var(--text);">${bucket}</div>
      <div style="flex:1;height:6px;background:#334155;border-radius:3px;display:flex;overflow:hidden;">
        <div style="width:${angryPct}%;background:var(--red)"></div>
        <div style="width:${frustPct}%;background:var(--yellow)"></div>
        <div style="width:${satPct}%;background:var(--green)"></div>
      </div>
      <div style="min-width:40px;text-align:right;color:var(--muted)">${v.total}</div>
      <div style="min-width:50px;text-align:right;color:${angryPct+frustPct > 30 ? 'var(--red)' : 'var(--muted)'};">${Math.round(angryPct+frustPct)}% neg</div>
    </div>`;
  }).join('');

  // Customer tone pie
  const TONE_COLORS = { aggressive: '#EF4444', pleading: '#F59E0B', sarcastic: '#F97316', calm: '#22C55E', neutral: '#94A3B8' };
  const custToneHTML = d.customerTones.map(ct =>
    `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px;">
      <div style="width:10px;height:10px;border-radius:50%;background:${TONE_COLORS[ct.tone]||'#64748B'};flex-shrink:0;"></div>
      <div style="flex:1;color:var(--text);text-transform:capitalize;">${ct.tone}</div>
      <div style="color:var(--muted)">${ct.count}</div>
      <div style="min-width:40px;text-align:right;font-weight:700;color:${ct.tone==='aggressive'?'var(--red)':ct.tone==='pleading'?'var(--yellow)':'var(--text)'};">${ct.pct}%</div>
    </div>`
  ).join('');

  // Agent tone
  const AGENT_TONE_COLORS = { empathetic: '#22C55E', helpful: '#06B6D4', robotic: '#F59E0B', defensive: '#EF4444', neutral: '#94A3B8' };
  const agentToneHTML = d.agentTones.map(at =>
    `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px;">
      <div style="width:10px;height:10px;border-radius:50%;background:${AGENT_TONE_COLORS[at.tone]||'#64748B'};flex-shrink:0;"></div>
      <div style="flex:1;color:var(--text);text-transform:capitalize;">${at.tone}</div>
      <div style="color:var(--muted)">${at.count}</div>
      <div style="min-width:40px;text-align:right;font-weight:700;color:${at.tone==='defensive'?'var(--red)':at.tone==='robotic'?'var(--yellow)':'var(--text)'};">${at.pct}%</div>
    </div>`
  ).join('');

  // Top frustration reasons
  const frustReasonsHTML = d.topFrustrationReasons.slice(0, 10).map((r, i) =>
    `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;">
      <div style="min-width:18px;color:var(--muted);text-align:right;">${i+1}.</div>
      <div style="flex:1;color:var(--text);">${r.reason}</div>
      <div style="font-weight:700;color:var(--yellow);">${r.count}</div>
    </div>`
  ).join('');

  const angerReasonsHTML = d.topAngerReasons.slice(0, 10).map((r, i) =>
    `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;">
      <div style="min-width:18px;color:var(--muted);text-align:right;">${i+1}.</div>
      <div style="flex:1;color:var(--text);">${r.reason}</div>
      <div style="font-weight:700;color:var(--red);">${r.count}</div>
    </div>`
  ).join('');

  // What's Helping / Not Helping
  const helpHTML = d.helpingFactors.map(h =>
    `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;padding:8px 12px;background:rgba(34,197,94,0.06);border-radius:6px;border-left:3px solid var(--green);">
      <div style="flex:1;color:var(--text);">${h.factor}</div>
      <div style="font-weight:700;color:var(--green);">${h.count}</div>
      <div style="color:var(--muted);min-width:40px;text-align:right;">${h.pct}%</div>

  ).join('');

  const hurtHTML = d.notHelpingFactors.map(h =>
    `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;padding:8px 12px;background:rgba(239,68,68,0.06);border-radius:6px;border-left:3px solid var(--red);">
      <div style="flex:1;color:var(--text);">${h.factor}</div>
      <div style="font-weight:700;color:var(--red);">${h.count}</div>
      <div style="color:var(--muted);min-width:40px;text-align:right;">${h.pct}%</div>
    </div>`
  ).join('');

  // Top frustrated call examples
  const frustCallsHTML = d.topFrustratedCalls.slice(0, 20).map(c => `
    <div class="call-item" onclick="openDetail('${c.call_sid}')" style="border-left-color:${SENT_COLORS[c.sentiment]};margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <div>
          <span style="color:${COLORS[c.product]||'var(--muted)'};font-size:11px;font-weight:700;">${c.product}</span>
          <span style="color:var(--muted);font-size:11px;margin-left:8px;">${c.category} | ${c.duration}m | 📍${c.circle||'?'}</span>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
          ${c.tonality.customerTone && c.tonality.customerTone !== 'neutral' ? '<span style="font-size:10px;padding:2px 8px;border-radius:8px;background:'+TONE_COLORS[c.tonality.customerTone]+'20;color:'+TONE_COLORS[c.tonality.customerTone]+';">'+c.tonality.customerTone+'</span>' : ''}
          ${c.tonality.escalationPattern ? '<span style="font-size:10px;padding:2px 8px;border-radius:8px;background:rgba(239,68,68,0.12);color:var(--red);">escalated</span>' : ''}
          <span class="sent-tag" style="background:${SENT_COLORS[c.sentiment]}20;color:${SENT_COLORS[c.sentiment]}">${c.sentiment} (${c.sentimentScore})</span>
        </div>
      </div>
      ${c.quote ? '<div class="story-quote" style="margin:8px 0">"'+c.quote+'"</div>' : ''}
      ${c.quoteEnglish ? '<div style="font-size:11px;color:var(--accent);margin-bottom:6px;font-style:italic;">'+c.quoteEnglish+'</div>' : ''}
      <div style="font-size:12px;color:#CBD5E1;margin-bottom:6px;line-height:1.5;">${c.summary}</div>
      ${c.notHelping.length ? '<div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap;">'+c.notHelping.map(nh=>'<span style="font-size:10px;padding:2px 7px;border-radius:6px;background:rgba(239,68,68,0.12);color:var(--red);font-weight:600;">'+nh.factor+'</span>').join('')+'</div>' : ''}
    </div>
  `).join('');

  el.innerHTML = `
    <div style="font-size:18px;font-weight:700;margin-bottom:4px;">Sentiment Deep-Dive</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:24px;">
      Transcript-level analysis of ${total.toLocaleString()} calls — frustration patterns, tonality, what's helping and what's not.
    </div>

    <!-- ═══ KPIs ═══ -->
    <div class="kpi-row" style="margin-bottom:24px;">
      <div class="kpi" style="border-left-color:var(--red)">
        <div class="label">Frustrated + Angry</div>
        <div class="value" style="color:var(--red)">${d.frustratedPct}%</div>
        <div class="detail">${d.sentimentDist.Frustrated + d.sentimentDist.Angry} of ${total} calls</div>
      </div>
      <div class="kpi" style="border-left-color:var(--yellow)">
        <div class="label">Frustrated Only</div>
        <div class="value" style="color:var(--yellow)">${Math.round(d.sentimentDist.Frustrated/total*100)}%</div>
        <div class="detail">${d.sentimentDist.Frustrated} calls</div>
      </div>
      <div class="kpi" style="border-left-color:#EF4444">
        <div class="label">Angry Only</div>
        <div class="value" style="color:var(--red)">${d.angryPct}%</div>
        <div class="detail">${d.sentimentDist.Angry} calls</div>
      </div>
      <div class="kpi" style="border-left-color:var(--green)">
        <div class="label">Satisfied</div>
        <div class="value" style="color:var(--green)">${d.satisfiedPct}%</div>
        <div class="detail">${d.sentimentDist.Satisfied} calls</div>
      </div>
      <div class="kpi" style="border-left-color:#F97316">
        <div class="label">Escalation Patterns</div>
        <div class="value">${d.escalationPatternCount}</div>
        <div class="detail">calls where customer went calm→angry</div>
      </div>
      <div class="kpi" style="border-left-color:var(--purple)">
        <div class="label">Tone Shifts: Calm→Angry</div>
        <div class="value">${d.toneShifts['calm→angry']||0}</div>
        <div class="detail">vs ${d.toneShifts['angry→calm']||0} angry→calm</div>
      </div>
    </div>

    <!-- ═══ Sentiment Distribution Bar ═══ -->
    <div style="background:var(--card);border-radius:8px;padding:20px;margin-bottom:24px;">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:10px;">Overall Sentiment Distribution</div>
      <div class="sentiment-bar" style="height:12px;margin-bottom:10px;">${sentBarHTML}</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;">${sentLegendHTML}</div>
    </div>

    <!-- ═══ Grid: Product Frustration + Duration ═══ -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
      <!-- Product Frustration -->
      <div style="background:var(--card);border-radius:8px;padding:20px;">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:14px;">Frustration Rate by Product</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;">${prodFrustHTML}</div>
      </div>

      <!-- Duration vs Sentiment -->
      <div style="background:var(--card);border-radius:8px;padding:20px;">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:14px;">Call Duration vs Sentiment</div>
        ${durHTML}
        <div style="display:flex;gap:12px;margin-top:10px;font-size:10px;color:var(--muted);">
          <span><span style="color:var(--red)">■</span> Angry</span>
          <span><span style="color:var(--yellow)">■</span> Frustrated</span>
          <span><span style="color:var(--green)">■</span> Satisfied</span>
        </div>
      </div>
    </div>

    <!-- ═══ Grid: Customer Tone + Agent Tone ═══ -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
      <div style="background:var(--card);border-radius:8px;padding:20px;">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:14px;">Customer Tonality</div>
        ${custToneHTML}
      </div>
      <div style="background:var(--card);border-radius:8px;padding:20px;">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:14px;">Agent Tonality</div>
        ${agentToneHTML}
      </div>
    </div>

    <!-- ═══ Grid: Frustration Reasons + Anger Reasons ═══ -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
      <div style="background:var(--card);border-radius:8px;padding:20px;">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--yellow);font-weight:700;margin-bottom:14px;">Top Frustration Reasons</div>
        ${frustReasonsHTML || '<div style="font-size:12px;color:var(--muted)">No frustrated calls detected</div>'}
      </div>
      <div style="background:var(--card);border-radius:8px;padding:20px;">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--red);font-weight:700;margin-bottom:14px;">Top Anger Reasons</div>
        ${angerReasonsHTML || '<div style="font-size:12px;color:var(--muted)">No angry calls detected</div>'}
      </div>
    </div>

    <!-- ═══ WHAT'S HELPING / NOT HELPING ═══ -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
      <div style="background:var(--card);border-radius:8px;padding:20px;">
        <div style="font-size:14px;font-weight:700;margin-bottom:4px;color:var(--green);display:flex;align-items:center;gap:8px;">
          ✅ What's Helping
        </div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:14px;">Agent behaviors that correlate with better outcomes</div>
        ${helpHTML || '<div style="font-size:12px;color:var(--muted)">No helping patterns detected</div>'}
      </div>
      <div style="background:var(--card);border-radius:8px;padding:20px;">
        <div style="font-size:14px;font-weight:700;margin-bottom:4px;color:var(--red);display:flex;align-items:center;gap:8px;">
          ❌ What's Not Helping
        </div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:14px;">Patterns that make frustrated/angry calls worse</div>
        ${hurtHTML || '<div style="font-size:12px;color:var(--muted)">No negative patterns detected</div>'}
      </div>
    </div>

    <!-- ═══ TOP FRUSTRATED CALLS ═══ -->
    <div style="margin-bottom:24px;">
      <div style="font-size:16px;font-weight:700;margin-bottom:4px;color:var(--red);display:flex;align-items:center;gap:8px;">
        🔥 Most Frustrated/Angry Calls (${d.topFrustratedCalls.length})
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px;">Ranked by sentiment intensity. Click to see full transcript.</div>
      <div class="call-list">${frustCallsHTML}</div>

  `;
}

function renderStories() {
  if(!stories.length) { document.getElementById('tab-stories').innerHTML='<div class="loading">No stories extracted</div>'; return; }

  // Split stories into crisis and positive
  const crisisStories = stories.filter(s => s.sentiment === 'Angry' || s.sentiment === 'Frustrated' || s.painSignals.length >= 2);
  const positiveStories = stories.filter(s => s.sentiment === 'Satisfied' && s.painSignals.length < 2);
  const otherStories = stories.filter(s => !crisisStories.includes(s) && !positiveStories.includes(s));

  function storyCard(s, i) {
    return `
      <div class="story-card" style="border-left-color:${s.sentimentColor}" onclick="openDetail('${s.call_sid}')">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <div>
            <span style="color:${COLORS[s.product]||'var(--muted)'};font-size:11px;font-weight:700;">${s.product}</span>
            <span style="color:var(--muted);font-size:11px;margin-left:8px;">${s.category} | ${s.duration}m${s.circle ? ' | '+s.circle : ''}</span>
            <span style="font-size:10px;color:var(--muted);margin-left:6px;">Score: ${s.storyScore||'—'}</span>
          </div>
          <div style="display:flex;gap:6px;align-items:center;">
            <span class="sent-tag" style="background:${s.sentimentColor}20;color:${s.sentimentColor}">${s.sentiment}</span>
          </div>
        </div>
        <div class="story-quote">"${s.quote}"</div>
        ${s.quoteEnglish ? `<div style="font-size:11px;color:var(--accent);margin-top:4px;margin-bottom:8px;font-style:italic;">English context: ${s.quoteEnglish}</div>` : ''}
        <div style="font-size:13px;color:#CBD5E1;margin-bottom:10px;line-height:1.6;">${s.summary}</div>
        <div class="call-tags">
          ${s.agentActions.map(a=>`<span class="chip chip-action">${a}</span>`).join('')}
          ${s.painSignals.map(p=>`<span class="chip chip-pain">${p}</span>`).join('')}
        </div>
      </div>`;
  }

  document.getElementById('tab-stories').innerHTML = `
    <div style="font-size:18px;font-weight:700;margin-bottom:6px;">User Stories — Real Calls, Real Insights</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:24px;">${stories.length} compelling calls auto-detected from ${stats.totalCalls} transcripts. Click any to see the full detail with transcript and recording.</div>

    ${crisisStories.length ? `
      <div style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--red);display:flex;align-items:center;gap:8px;">
        <span style="width:10px;height:10px;border-radius:50%;background:var(--red);display:inline-block;"></span>
        Crisis Stories (${crisisStories.length}) — Angry, Frustrated, or Multiple Pain Signals
      </div>
      ${crisisStories.map((s,i)=>storyCard(s,i)).join('')}
    ` : ''}

    ${positiveStories.length ? `
      <div style="font-size:14px;font-weight:700;margin:24px 0 12px;color:var(--green);display:flex;align-items:center;gap:8px;">
        <span style="width:10px;height:10px;border-radius:50%;background:var(--green);display:inline-block;"></span>
        Good Calls (${positiveStories.length}) — Satisfied Customers, Positive Outcomes
      </div>
      ${positiveStories.map((s,i)=>storyCard(s,i)).join('')}
    ` : ''}

    ${otherStories.length ? `
      <div style="font-size:14px;font-weight:700;margin:24px 0 12px;color:var(--accent);display:flex;align-items:center;gap:8px;">
        <span style="width:10px;height:10px;border-radius:50%;background:var(--accent);display:inline-block;"></span>
        Notable Calls (${otherStories.length}) — Interesting Patterns
      </div>
      ${otherStories.map((s,i)=>storyCard(s,i)).join('')}
    ` : ''}
  `;
}

// ─── PRODUCTS DEEP DIVE ───
function renderProducts() {
  const el = document.getElementById('tab-products');
  const products = stats.products;
  const total = stats.totalCalls;

  let cardsHTML = '';
  for (const [name, p] of Object.entries(products).sort((a,b)=>b[1].total-a[1].total)) {
    const color = COLORS[name]||'var(--muted)';
    const subs = Object.entries(p.subcategories).sort((a,b)=>b[1].count-a[1].count);
    const topActions = Object.entries(p.agentActions).sort((a,b)=>b[1]-a[1]);
    const maxSub = subs.length ? subs[0][1].count : 1;
    const angryPct = Math.round((p.sentiments.Angry + p.sentiments.Frustrated) / p.total * 100);
    const satisfiedPct = Math.round(p.sentiments.Satisfied / p.total * 100);
    const resolvedCount = p.agentActions['Resolved on Call']||0;
    const escalatedCount = (p.agentActions['Raised Ticket / Escalated']||0);

    // Sentiment mini-bar
    const sentMiniBar = Object.entries(p.sentiments).map(([k,v])=>`<div style="width:${v/p.total*100}%;background:${SENT_COLORS[k]}" title="${k}: ${v} (${Math.round(v/p.total*100)}%)"></div>`).join('');

    // All issues
    const issuesHTML = subs.map(([sub, sv]) => {
      const sentDot = Object.entries(sv.sentiments).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1])[0];
      const dotColor = sentDot ? SENT_COLORS[sentDot[0]] : 'var(--muted)';
      return `<div class="issue-row" onclick="filterProduct('${name}');filterCategory('${sub.replace(/'/g,"\\'")}');switchTab('calls',document.querySelectorAll('.main-tab')[3]);">
        <div style="width:6px;height:6px;border-radius:50%;background:${dotColor};flex-shrink:0;"></div>
        <div class="issue-name">${sub}</div>
        <div class="issue-bar"><div class="issue-bar-fill" style="width:${sv.count/maxSub*100}%;background:${color}"></div></div>
        <div class="issue-count">${sv.count}</div>
        <div class="issue-pct">${Math.round(sv.count/p.total*100)}%</div>
      </div>`;
    }).join('');

    // Agent actions
    const actionsHTML = topActions.map(([a,c]) => `
      <div class="action-stat">
        <span style="color:var(--text)">${a}</span>
        <span>${c} <span style="color:var(--muted)">(${Math.round(c/p.total*100)}%)</span></span>
      </div>
    `).join('');

    </div>`;
  }

  el.innerHTML = `
    <div style="font-size:18px;font-weight:700;margin-bottom:6px;">Product Deep Dive</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:24px;">Detailed breakdown of every product — issues, agent responses, sentiment, and escalation rates.</div>
    <div class="pdp-grid">${cardsHTML}</div>
  `;
}

// ─── USERS & ESCALATIONS ───
function renderUsers() {
  const el = document.getElementById('tab-users');

  const u = userStats;
  const esc = escalationData;

  const kpiHTML = `

      <div class="kpi" style="border-left-color:var(--cyan)"><div class="label">Single Call</div><div class="value">${u.singleCallers?.toLocaleString()}</div><div class="detail">Called once</div></div>
      <div class="kpi" style="border-left-color:var(--yellow)"><div class="label">Repeat (2+)</div><div class="value">${u.repeatCallers?.toLocaleString()}</div><div class="detail">${Math.round((u.repeatCallers||0)/(u.uniqueCallers||1)*100)}% of callers</div></div>
      <div class="kpi" style="border-left-color:var(--purple)"><div class="label">Frequent (3+)</div><div class="value">${u.frequentCallers?.toLocaleString()}</div></div>

      <div class="kpi" style="border-left-color:var(--red)"><div class="label">Total Escalations</div><div class="value">${esc.total?.toLocaleString()}</div><div class="detail">${esc.percentage}% of all calls</div></div>

    <div class="esc-card" style="margin-bottom:24px;">

      <div style="max-height:400px;overflow-y:auto;">

              <td style="font-weight:700;color:${c.calls>=5?'var(--red)':c.calls>=3?'var(--yellow)':'var(--text)'}">${c.calls}</td>
              <td>${c.totalMin}</td>
              <td>${c.products}</td>
              <td style="color:${c.angry>0?'var(--red)':'var(--muted)'}">${c.angry}</td>
              <td style="color:${c.escalations>0?'var(--yellow)':'var(--muted)'}">${c.escalations}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  ` : '';

  // Escalation by product
  const escByProduct = esc.byProduct || [];
  const maxEsc = escByProduct.length ? escByProduct[0].count : 1;
  const escProductHTML = escByProduct.map(e => {
    const color = COLORS[e.product]||'var(--muted)';
    return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
      <div style="min-width:120px;font-size:12px;color:var(--text)">${e.product}</div>
      <div style="flex:1;height:6px;background:#1E293B;border-radius:3px;overflow:hidden;">
        <div style="width:${e.count/maxEsc*100}%;height:100%;background:${color};border-radius:3px;"></div>
      </div>
      <div style="min-width:50px;text-align:right;font-size:12px;font-weight:700;">${e.count}</div>
    </div>`;
  }).join('');

  // Top escalation categories
  const escCats = esc.topCategories || [];
  const maxEscCat = escCats.length ? escCats[0].count : 1;
  const escCatHTML = escCats.slice(0,12).map(e => {
    const color = COLORS[e.product]||'var(--muted)';
    return `<div class="issue-row" onclick="filterProduct('${e.product}');filterCategory('${(e.category||'').replace(/'/g,"\\'")}');switchTab('calls',document.querySelectorAll('.main-tab')[3]);">
      <div style="width:6px;height:6px;border-radius:50%;background:${color};flex-shrink:0;"></div>
      <div class="issue-name"><span style="color:${color};font-weight:600">${e.product}</span> → ${e.category}</div>
      <div class="issue-bar"><div class="issue-bar-fill" style="width:${e.count/maxEscCat*100}%;background:var(--red)"></div></div>
      <div class="issue-count">${e.count}</div>
    </div>`;
  }).join('');

  // Region data
  const maxReg = regionData.length ? regionData[0].calls : 1;
  const regionHTML = regionData.map(r => {
    const angryPct = r.calls ? Math.round(r.angry/r.calls*100) : 0;
    const escPct = r.calls ? Math.round(r.escalations/r.calls*100) : 0;
    return `<div class="region-row">
      <div class="region-name">${r.region}</div>
      <div class="region-bar">
        <div style="width:${r.calls/maxReg*100}%;background:var(--accent);border-radius:3px;" title="${r.calls} calls"></div>

      <div style="min-width:40px;text-align:right;font-size:12px;font-weight:600;">${r.calls}</div>
      <div style="min-width:60px;text-align:right;font-size:11px;color:${angryPct>10?'var(--red)':'var(--muted)'}">${angryPct}% angry</div>
      <div style="min-width:50px;text-align:right;font-size:11px;color:${escPct>15?'var(--yellow)':'var(--muted)'}">${escPct}% esc</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div style="font-size:18px;font-weight:700;margin-bottom:6px;">Users & Escalations</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:24px;">Caller patterns, repeat callers, escalation hotspots, and regional distribution.</div>

    ${kpiHTML}
    ${callersHTML}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
      <div class="esc-card" style="border-left:4px solid var(--red)">

        ${escProductHTML}

        <div style="font-size:14px;font-weight:700;margin-bottom:14px;">Regions — Call Volume & Quality</div>
        ${regionHTML}
      </div>
    </div>

    <div class="esc-card">
      <div style="font-size:14px;font-weight:700;margin-bottom:14px;">Top Escalation Categories</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:12px;">Which product × issue combos generate the most escalations? Click any to browse those calls.</div>
      ${escCatHTML}
    </div>
  `;
}

// ─── TECH ISSUES ───
function renderTechIssues() {
  const el = document.getElementById('tab-techissues');
  if (!techIssues || !techIssues.totalTechCalls) { el.innerHTML='<div class="loading">No tech issue data</div>'; return; }
  const ti = techIssues;
  console.log('renderTechIssues:', JSON.stringify({buckets: (ti.byIssueBucket||[]).length, matrix: (ti.productIssueMatrix||[]).length, edu: ti.productEduGaps ? Object.keys(ti.productEduGaps).length : 0, samples: (ti.sampleCalls||[]).length, bucketSamples: ti.bucketSamples ? Object.keys(ti.bucketSamples).length : 0}));
  try {

  const BUCKET_COLORS = {
    'OTP / Verification Failure': '#F59E0B',
    'Account Access / Login': '#EF4444',
    'Password / MPIN Reset': '#EC4899',
    'App Update / Install': '#3B82F6',
    'App Crash / Not Working': '#8B5CF6',
    'Payment / Transaction Error': '#F97316',
    'UPI / Mandate Issue': '#A855F7',
    'Network / Connectivity': '#DC2626',
    'KYC / Document Issue': '#06B6D4',
    'General Tech Issue': '#64748B',
  };
  const BUCKET_ICONS = {
    'OTP / Verification Failure': '🔐',
    'Account Access / Login': '🔑',
    'Password / MPIN Reset': '🔒',
    'App Update / Install': '📱',
    'App Crash / Not Working': '💥',
    'Payment / Transaction Error': '💳',
    'UPI / Mandate Issue': '🏦',
    'Network / Connectivity': '🌐',
    'KYC / Document Issue': '📋',
    'General Tech Issue': '🔧',
  };

  // ─── 1. KPI Row ───
  const topBucket = (ti.byIssueBucket||[])[0];
  const worstResolved = (ti.byIssueBucket||[]).filter(b=>b.count>=5).sort((a,b)=>a.resolvePct-b.resolvePct)[0];

  // ─── 2. Issue Buckets ───
  const maxBucket = topBucket ? topBucket.count : 1;
  const bucketHTML = (ti.byIssueBucket || []).map(b => {
    const color = BUCKET_COLORS[b.bucket] || '#64748B';
    const icon = BUCKET_ICONS[b.bucket] || '🔧';
    const barW = Math.round(b.count / maxBucket * 100);
    return `
    <div style="background:var(--card);border-radius:8px;padding:14px 18px;margin-bottom:8px;border-left:4px solid ${color};">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="font-size:13px;font-weight:700;">${icon} ${b.bucket}</span>
        <span style="font-size:18px;font-weight:800;color:${color}">${b.count}</span>
      </div>
      <div style="background:#0F172A;border-radius:4px;height:6px;margin-bottom:6px;">
        <div style="background:${color};height:100%;border-radius:4px;width:${barW}%;transition:width 0.3s;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px;">
        <span style="color:${b.frustPct>40?'var(--red)':b.frustPct>25?'var(--yellow)':'var(--muted)'}">${b.frustPct}% frustrated</span>
        <span style="color:${b.resolvePct<30?'var(--red)':b.resolvePct<50?'var(--yellow)':'var(--green)'}">${b.resolvePct}% resolved</span>
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;">
        ${b.products.map(p => '<span style="font-size:10px;padding:2px 8px;border-radius:8px;background:'+(COLORS[p.product]||'#64748B')+'20;color:'+(COLORS[p.product]||'#64748B')+';font-weight:600;">'+p.product+': '+p.count+'</span>').join('')}
      </div>
      ${b.sampleQuotes && b.sampleQuotes.length > 0 ? '<div style="margin-top:6px;font-size:11px;color:#94A3B8;font-style:italic;border-top:1px solid #1E293B;padding-top:6px;">"'+b.sampleQuotes[0].replace(/"/g,'&quot;')+'"</div>' : ''}
    </div>`;
  }).join('');

  // ─── 3. Product × Issue Bucket Matrix ───
  const matrix = ti.productIssueMatrix || [];
  const bucketNames = ti.allBucketNames || [];
  let matrixHTML = '';
  if (matrix.length > 0 && bucketNames.length > 0) {
    const headerCells = bucketNames.map(bn => {
      const short = bn.split('/')[0].trim().split(' ').slice(0,2).join(' ');
      return '<th style="font-size:10px;padding:6px 4px;color:var(--muted);text-align:center;writing-mode:vertical-lr;transform:rotate(180deg);min-width:32px;">'+short+'</th>';
    }).join('');
    const rows = matrix.map(row => {
      const color = COLORS[row.product]||'#64748B';
      const cells = row.buckets.map(b => {
        const bg = b.count > 0 ? (BUCKET_COLORS[b.bucket]||'#64748B') : 'transparent';
        const opacity = b.count > 0 ? Math.max(0.2, Math.min(1, b.count / 15)) : 0;
        return '<td style="text-align:center;padding:4px;"><div style="width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:'+bg+';opacity:'+opacity+';margin:auto;color:#fff;">'+(b.count>0?b.count:'')+'</div></td>';
      }).join('');
      return '<tr><td style="font-size:12px;font-weight:700;padding:6px 8px;color:'+color+';white-space:nowrap;">'+row.product+' <span style="color:var(--muted);font-weight:400;">('+row.total+')</span></td>'+cells+'</tr>';
    }).join('');
    matrixHTML = `<table style="width:100%;border-collapse:collapse;background:var(--card);border-radius:8px;overflow:hidden;">
      <thead><tr><th style="text-align:left;padding:8px;font-size:12px;color:var(--muted);">Product</th>${headerCells}</tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  // ─── 4. Product Education Gaps ───
  const eduGaps = ti.productEduGaps || {};
  const eduProducts = Object.keys(eduGaps).sort((a,b) => {
    const ta = eduGaps[a].reduce((s,g)=>s+g.count,0);
    const tb = eduGaps[b].reduce((s,g)=>s+g.count,0);
    return tb - ta;
  });
  const eduHTML = eduProducts.map(prod => {
    const gaps = eduGaps[prod].slice(0, 6);
    const color = COLORS[prod]||'#64748B';
    const totalGapCalls = gaps.reduce((s,g)=>s+g.count,0);
    const gapRows = gaps.map(g => {
      const barW = totalGapCalls > 0 ? Math.round(g.count / gaps[0].count * 100) : 0;
      return `<div style="margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;">
          <span style="font-weight:600;">${g.gap}</span>
          <span style="font-weight:700;">${g.count} <span style="color:${g.frustPct>40?'var(--red)':'var(--muted)'};font-size:10px;">(${g.frustPct}%F)</span></span>
        </div>
        <div style="background:#0F172A;border-radius:3px;height:4px;">
          <div style="background:${color};height:100%;border-radius:3px;width:${barW}%;"></div>
        </div>
      </div>`;
    }).join('');
    return `<div style="background:var(--card);border-radius:8px;padding:16px;border-top:3px solid ${color};">
      <div style="font-size:14px;font-weight:700;margin-bottom:4px;color:${color}">${prod}</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px;">${totalGapCalls} calls with education gaps</div>
      ${gapRows}
    </div>`;
  }).join('');

  // ─── 5. Sample Calls GROUPED BY BUCKET ───
  const bs = ti.bucketSamples || {};
  const sampleHTML = Object.entries(bs).map(([bucket, calls]) => {
    const bColor = BUCKET_COLORS[bucket] || '#64748B';
    const bIcon = BUCKET_ICONS[bucket] || '🔧';
    const callCards = calls.map(c => `
      <div class="call-item" onclick="openDetail('${c.call_sid}')" style="margin-bottom:6px;border-left-color:${bColor}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;">
          <div>
            <span style="color:${COLORS[c.product]||'var(--muted)'};font-size:11px;font-weight:700;">${c.product}</span>
            <span style="color:var(--muted);font-size:11px;margin-left:6px;">${c.duration}m</span>
          </div>
          <span class="sent-tag" style="background:${SENT_COLORS[c.sentiment]||'#64748B'}20;color:${SENT_COLORS[c.sentiment]||'#64748B'}">${c.sentiment}</span>
        </div>
        ${c.quote ? '<div style="font-size:12px;color:#CBD5E1;font-style:italic;margin-bottom:3px;">"'+c.quote+'"</div>' : ''}
        ${c.recordingUrl ? '<div style="margin-top:4px;"><audio controls preload="none" style="width:100%;height:28px;"><source src="'+c.recordingUrl+'" type="audio/mpeg"></audio></div>' : ''}
      </div>`).join('');
    return `<div style="margin-bottom:16px;">
      <div style="font-size:13px;font-weight:700;color:${bColor};margin-bottom:8px;padding:6px 12px;background:${bColor}15;border-radius:6px;display:inline-block;">${bIcon} ${bucket} (${calls.length} samples)</div>
      ${callCards}
    </div>`;
  }).join('');

  // ─── RENDER ───
  el.innerHTML = `
    <div style="font-size:18px;font-weight:700;margin-bottom:4px;">Technical Issues & Product Education Gaps</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:24px;">Tech issue bucketing from transcript analysis + what users don't understand per product.</div>

    <div class="kpi-row" style="margin-bottom:24px;">
      <div class="kpi" style="border-left-color:var(--red)"><div class="label">Tech Issue Calls</div><div class="value" style="color:var(--red)">${ti.totalTechCalls}</div><div class="detail">${ti.pctOfTotal}% of all calls</div></div>
      <div class="kpi" style="border-left-color:var(--accent)"><div class="label">Issue Types Found</div><div class="value">${(ti.byIssueBucket||[]).length}</div></div>
      <div class="kpi" style="border-left-color:var(--yellow)"><div class="label">#1 Issue</div><div class="value" style="font-size:16px;">${topBucket?topBucket.bucket:'—'}</div><div class="detail">${topBucket?topBucket.count+' calls':''}</div></div>
      <div class="kpi" style="border-left-color:var(--red)"><div class="label">Worst Resolve Rate</div><div class="value" style="font-size:16px;color:var(--red)">${worstResolved?worstResolved.bucket:'—'}</div><div class="detail">${worstResolved?worstResolved.resolvePct+'% resolved':''}</div></div>
    </div>

    <div style="font-size:15px;font-weight:700;margin-bottom:12px;">🔧 Issue Buckets — What's Actually Breaking</div>
    <div style="margin-bottom:24px;">${bucketHTML}</div>

    ${matrixHTML ? `<div style="font-size:15px;font-weight:700;margin-bottom:12px;">📊 Product × Issue Heatmap</div>
    <div style="overflow-x:auto;margin-bottom:24px;">${matrixHTML}</div>` : ''}

    <div style="font-size:15px;font-weight:700;margin-bottom:12px;">📚 Product Education Gaps — What Users Don't Understand</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px;">Transcript analysis of all ${ti.totalTechCalls} tech calls + broader patterns across all calls showing where users are confused per product.</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px;">${eduHTML}</div>

    <div style="font-size:15px;font-weight:700;margin-bottom:12px;">🎧 Sample Tech Issue Calls</div>
    <div class="call-list">${sampleHTML}</div>
  `;
  } catch(err) {
    console.error('renderTechIssues ERROR:', err);
    el.innerHTML = '<div style="color:var(--red);padding:20px;">Error rendering tech issues: ' + err.message + '</div>';
  }
}

// ─── Transcript Parser ───
function parseTranscript(text) {
  if(!text) return [{text:'No transcript',cls:'sp-0',isAgent:true}];
  const lines=[], parts=text.split(/(\[Speaker \d+\])/);
  let spk=null;
  for(const part of parts) {
    const m=part.match(/\[Speaker (\d+)\]/);
    if(m){spk=parseInt(m[1]);continue;}
    const t=part.trim();
    if(t&&spk!==null) lines.push({text:t,cls:spk===0?'sp-0':'sp-1',isAgent:spk===0});
  }
  if(!lines.length) lines.push({text:text.slice(0,2000),cls:'sp-0',isAgent:false});
  return lines;
}
