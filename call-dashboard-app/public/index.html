                <div style="font-size:16px;font-weight:700;">${d.total}</div>
                <div style="color:var(--muted);">calls</div>
              </div>
              <div style="background:#0F172A;padding:8px;border-radius:6px;">
                <div style="font-size:16px;font-weight:700;color:var(--green);">${d.satPct}%</div>
                <div style="color:var(--muted);">satisfied</div>
              </div>
              <div style="background:#0F172A;padding:8px;border-radius:6px;">
                <div style="font-size:16px;font-weight:700;color:var(--red);">${d.angryPct}%</div>
                <div style="color:var(--muted);">angry</div>
              </div>
              <div style="background:#0F172A;padding:8px;border-radius:6px;">
                <div style="font-size:16px;font-weight:700;color:var(--yellow);">${d.escPct}%</div>
                <div style="color:var(--muted);">escalated</div>
              </div>
            </div>
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;font-weight:700;">Top Dispositions</div>
            ${d.topDispositions.map(td => '<div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid #1E293B;"><span style="color:var(--text);">'+td.action+'</span><span style="color:var(--muted);">'+td.count+' ('+td.pct+'%)</span></div>').join('')}
            <div style="font-size:11px;color:var(--muted);margin-top:8px;">Avg: ${d.avgDur}min | Resolved: ${d.resolvePct}%</div>
          </div>`;
        }).join('')}
      </div>`;
  }

  // ═══ Dispositions ═══
  function renderDispositions() {
    return `
      <div style="font-size:14px;font-weight:700;margin-bottom:16px;">Disposition Analysis — How Agents Respond</div>
      ${ai.dispositions.map(d => `
        <div style="background:var(--card);border-radius:8px;padding:16px 20px;margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <span style="font-size:14px;font-weight:700;color:var(--text);">${d.action}</span>
            <div style="display:flex;gap:8px;align-items:center;">
              <span style="font-size:20px;font-weight:800;">${d.count}</span>
              <span style="font-size:11px;color:var(--muted);">${d.pct}% of calls</span>
            </div>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">
            ${d.productBreakdown.map(pb => '<span style="font-size:10px;padding:3px 8px;border-radius:8px;background:'+(COLORS[pb.product]||'var(--muted)')+'20;color:'+(COLORS[pb.product]||'var(--muted)')+';font-weight:700;">'+pb.product+': '+pb.count+'</span>').join('')}
          </div>
          ${d.topCalls.length ? '<div style="display:flex;gap:6px;flex-wrap:wrap;font-size:10px;">'+d.topCalls.map(tc=>'<span style="padding:4px 8px;background:#0F172A;border-radius:4px;cursor:pointer;color:var(--muted);" onclick="openDetail(\''+tc.call_sid+'\')" title="'+tc.quote.replace(/"/g,'&quot;')+'">\u{1F517} '+tc.product+' | '+tc.category+' | '+tc.durationMin+'m</span>').join('')+'</div>' : ''}
        </div>
      `).join('')}`;
  }

  // ═══ Escalation Deep Dive ═══
  function renderEscDeepDive() {
    const esc = ai.escalationDeepDive;
    return `
      <div style="font-size:14px;font-weight:700;margin-bottom:4px;">Escalation Deep Dive</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px;">${esc.totalEscalations} escalations (${esc.escPct}% of calls) | Avg escalation call: ${esc.avgEscDuration}min</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <div style="background:var(--card);border-radius:8px;padding:20px;">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:12px;">Escalations by Department</div>
          ${esc.byDept.map(d => {
            const color = COLORS[d.dept] || 'var(--muted)';
            return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;"><div style="min-width:100px;color:var(--text);font-weight:600;">'+d.dept+'</div><div style="flex:1;height:6px;background:#334155;border-radius:3px;overflow:hidden;"><div style="height:100%;width:'+(d.count/esc.byDept[0].count*100)+'%;background:'+color+';border-radius:3px;"></div></div><div style="min-width:30px;text-align:right;">'+d.count+'</div><div style="min-width:40px;text-align:right;color:var(--red);">'+d.pct+'%</div></div>';
          }).join('')}
        </div>
        <div style="background:var(--card);border-radius:8px;padding:20px;">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:12px;">Top Escalation Categories</div>
          ${esc.topCategories.map((c,i) => '<div style="display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid #1E293B;"><span style="color:var(--text);">'+(i+1)+'. '+c.category+'</span><span style="font-weight:700;">'+c.count+'</span></div>').join('')}
        </div>
      </div>`;
  }

  // ═══ Co-Occurrence Patterns ═══
  function renderCoPatterns() {
    return `
      <div style="font-size:14px;font-weight:700;margin-bottom:4px;">Pain Signal Co-Occurrence Patterns</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px;">When these signals appear together in the same call</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:10px;">
        ${ai.coPatterns.map((cp,i) => `
          <div style="background:var(--card);border-radius:8px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;">
            <div>
              <span style="font-size:12px;font-weight:700;color:var(--text);">${i+1}. ${cp.pattern}</span>
            </div>
            <span style="font-size:16px;font-weight:800;color:var(--yellow);">${cp.count}</span>
          </div>
        `).join('')}
      </div>`;
  }

  // ═══ Action Plan ═══
  function renderActionPlan() {
    return `
      <div style="font-size:14px;font-weight:700;margin-bottom:4px;">Prioritized Action Plan</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px;">Auto-generated from call analysis — ${ai.actionPlan.length} items</div>
      ${ai.actionPlan.map((a,i) => `
        <div style="background:var(--card);border-radius:8px;padding:16px 20px;margin-bottom:10px;border-left:4px solid ${a.priority==='P0'?'var(--red)':'var(--yellow)'};">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="font-size:11px;padding:2px 8px;border-radius:4px;background:${a.priority==='P0'?'rgba(239,68,68,0.15)':'rgba(245,158,11,0.15)'};color:${a.priority==='P0'?'var(--red)':'var(--yellow)'};font-weight:700;">${a.priority}</span>
              <span style="font-size:13px;font-weight:700;color:var(--text);">${a.issue}</span>
            </div>
            <span style="font-size:11px;color:var(--muted);">${a.metric}</span>
          </div>
          <div style="font-size:12px;color:var(--muted);">${a.reason}</div>
        </div>
      `).join('')}`;
  }

  // ═══ Claude AI Analysis ═══
  function renderClaudeAnalysis() {
    return `
      <div style="font-size:14px;font-weight:700;margin-bottom:4px;color:var(--purple);">Claude AI Call Analysis</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px;">Use Anthropic Claude to deeply analyze individual call transcripts for accurate frustration scoring, tone progression, and churn risk.</div>
      <div style="background:var(--card);border-radius:10px;padding:24px;margin-bottom:16px;">
        <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;">
          <input type="text" id="claude-sid-input" placeholder="Enter call_sid to analyze..." style="flex:1;background:var(--bg);border:1px solid #334155;color:var(--text);padding:10px 14px;border-radius:6px;font-size:13px;font-family:monospace;">
          <button onclick="runClaudeAnalysis()" style="background:var(--purple);color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;">Analyze with Claude</button>
        </div>
        <div id="claude-result" style="font-size:12px;color:var(--muted);">Enter a call_sid and click analyze. Claude will read the full transcript and provide deep sentiment analysis.</div>
      </div>
      <div style="background:var(--card);border-radius:10px;padding:20px;">
        <div style="font-size:12px;font-weight:700;margin-bottom:10px;color:var(--muted);">Quick Analyze — Top Frustrated Calls</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${(sentimentDD?.topFrustratedCalls || []).slice(0,10).map(c =>
            '<button onclick="document.getElementById(\'claude-sid-input\').value=\''+c.call_sid+'\';runClaudeAnalysis();" style="font-size:10px;padding:4px 10px;border-radius:6px;background:'+SENT_COLORS[c.sentiment]+'15;color:'+SENT_COLORS[c.sentiment]+';border:1px solid '+SENT_COLORS[c.sentiment]+'30;cursor:pointer;">'+c.product+' | '+c.duration+'m | '+c.sentiment+'</button>'
          ).join('')}
        </div>
      </div>`;
  }

  // ═══ Main render ═══
  el.innerHTML = `
    <div style="font-size:18px;font-weight:700;margin-bottom:4px;">Advanced Insights</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:20px;">
      L2 issues, breaking/helping signals, department health, dispositions, escalation analysis, co-patterns, action plan, and Claude AI analysis.
    </div>

    <!-- Sub-tabs -->
    <div style="display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap;">
      <button class="main-tab adv-subtab active" data-tab="l2" onclick="document.querySelectorAll('.adv-subtab').forEach(b=>b.classList.remove('active'));this.classList.add('active');document.getElementById('adv-content').innerHTML=renderL2SubTab();">L2 Issues</button>
      <button class="main-tab adv-subtab" data-tab="breaking" onclick="document.querySelectorAll('.adv-subtab').forEach(b=>b.classList.remove('active'));this.classList.add('active');document.getElementById('adv-content').innerHTML=renderBreakingSubTab();">Breaking Us</button>
      <button class="main-tab adv-subtab" data-tab="helping" onclick="document.querySelectorAll('.adv-subtab').forEach(b=>b.classList.remove('active'));this.classList.add('active');document.getElementById('adv-content').innerHTML=renderHelpingSubTab();">Helping Us</button>
      <button class="main-tab adv-subtab" data-tab="health" onclick="document.querySelectorAll('.adv-subtab').forEach(b=>b.classList.remove('active'));this.classList.add('active');document.getElementById('adv-content').innerHTML=renderHealthSubTab();">Dept Health</button>
      <button class="main-tab adv-subtab" data-tab="dispositions" onclick="document.querySelectorAll('.adv-subtab').forEach(b=>b.classList.remove('active'));this.classList.add('active');document.getElementById('adv-content').innerHTML=renderDispSubTab();">Dispositions</button>
      <button class="main-tab adv-subtab" data-tab="escalations" onclick="document.querySelectorAll('.adv-subtab').forEach(b=>b.classList.remove('active'));this.classList.add('active');document.getElementById('adv-content').innerHTML=renderEscSubTab();">Escalations</button>
      <button class="main-tab adv-subtab" data-tab="copatterns" onclick="document.querySelectorAll('.adv-subtab').forEach(b=>b.classList.remove('active'));this.classList.add('active');document.getElementById('adv-content').innerHTML=renderCoPattSubTab();">Co-Patterns</button>
      <button class="main-tab adv-subtab" data-tab="actions" onclick="document.querySelectorAll('.adv-subtab').forEach(b=>b.classList.remove('active'));this.classList.add('active');document.getElementById('adv-content').innerHTML=renderActionSubTab();">Action Plan</button>
      <button class="main-tab adv-subtab" data-tab="claude" style="background:rgba(167,139,250,0.15);color:var(--purple);border:1px solid rgba(167,139,250,0.3);" onclick="document.querySelectorAll('.adv-subtab').forEach(b=>b.classList.remove('active'));this.classList.add('active');document.getElementById('adv-content').innerHTML=renderClaudeSubTab();">Claude AI</button>
    </div>

    <div id="adv-content"></div>
  `;

  // Expose sub-tab render functions globally
  window.renderL2SubTab = renderL2;
  window.renderBreakingSubTab = renderBreaking;
  window.renderHelpingSubTab = renderHelping;
  window.renderHealthSubTab = renderDeptHealth;
  window.renderDispSubTab = renderDispositions;
  window.renderEscSubTab = renderEscDeepDive;
  window.renderCoPattSubTab = renderCoPatterns;
  window.renderActionSubTab = renderActionPlan;
  window.renderClaudeSubTab = renderClaudeAnalysis;

  // Default sub-tab
  document.getElementById('adv-content').innerHTML = renderL2();
}

// ─── Claude AI Analysis Handler ───
async function runClaudeAnalysis() {
  const sid = document.getElementById('claude-sid-input')?.value?.trim();
  if (!sid) return;
  const resultEl = document.getElementById('claude-result');
  resultEl.innerHTML = '<div class="loading"><div class="spinner"></div>Analyzing with Claude AI... (may take 10-20s)</div>';

  try {
    const res = await fetch('/api/claude-analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ call_sid: sid })
    });
    const data = await res.json();

    if (data.error) {
      resultEl.innerHTML = '<div style="color:var(--red);padding:12px;">Error: '+data.error+'</div>';
      return;
    }

    const a = data.analysis;
    if (a.error) {
      resultEl.innerHTML = '<div style="color:var(--red);padding:12px;">Claude API Error: '+a.error+'</div>';
      return;
    }

    resultEl.innerHTML = `
      <div style="background:#0F172A;border-radius:10px;padding:20px;border-left:4px solid var(--purple);">
        <div style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--purple);">Claude AI Analysis — ${sid.substring(0,12)}…</div>

        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px;">
          <div style="background:var(--card);padding:12px;border-radius:8px;text-align:center;">
            <div style="font-size:24px;font-weight:800;color:${a.frustrationScore>60?'var(--red)':a.frustrationScore>30?'var(--yellow)':'var(--green)'};">${a.frustrationScore}/100</div>
            <div style="font-size:10px;color:var(--muted);">Frustration Score</div>
          </div>
          <div style="background:var(--card);padding:12px;border-radius:8px;text-align:center;">
            <div style="font-size:14px;font-weight:700;text-transform:capitalize;color:var(--text);">${a.customerTone}</div>
            <div style="font-size:10px;color:var(--muted);">Customer Tone</div>
          </div>
          <div style="background:var(--card);padding:12px;border-radius:8px;text-align:center;">
            <div style="font-size:14px;font-weight:700;text-transform:capitalize;color:var(--text);">${a.agentTone}</div>
            <div style="font-size:10px;color:var(--muted);">Agent Tone</div>
          </div>
          <div style="background:var(--card);padding:12px;border-radius:8px;text-align:center;">
            <div style="font-size:14px;font-weight:700;color:${a.churnRisk==='critical'||a.churnRisk==='high'?'var(--red)':a.churnRisk==='medium'?'var(--yellow)':'var(--green)'};">${a.churnRisk}</div>
            <div style="font-size:10px;color:var(--muted);">Churn Risk</div>
          </div>
          <div style="background:var(--card);padding:12px;border-radius:8px;text-align:center;">
            <div style="font-size:14px;font-weight:700;color:var(--text);">${a.customerEffort}</div>
            <div style="font-size:10px;color:var(--muted);">Customer Effort</div>
          </div>
        </div>

        <div style="margin-bottom:12px;">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:700;">TONE PROGRESSION</div>
          <div style="font-size:13px;color:var(--text);padding:8px 12px;background:var(--card);border-radius:6px;">${a.toneProgression || '—'}</div>
        </div>

        <div style="margin-bottom:12px;">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:700;">ONE-LINER</div>
          <div style="font-size:13px;color:var(--text);padding:8px 12px;background:var(--card);border-radius:6px;line-height:1.5;">${a.oneLiner || '—'}</div>
        </div>

        ${a.keyFrustrationDrivers && a.keyFrustrationDrivers.length ? `
          <div style="margin-bottom:12px;">
            <div style="font-size:11px;color:var(--red);margin-bottom:6px;font-weight:700;">KEY FRUSTRATION DRIVERS</div>
            ${a.keyFrustrationDrivers.map(d => '<div style="font-size:12px;padding:6px 10px;background:rgba(239,68,68,0.06);border-radius:4px;margin-bottom:4px;color:var(--text);border-left:2px solid var(--red);">'+d+'</div>').join('')}
          </div>
        ` : ''}

        <div style="display:flex;gap:16px;font-size:12px;">
          <span>Escalation: <b style="color:${a.escalationDetected?'var(--red)':'var(--green)'};">${a.escalationDetected?'Yes':'No'}</b></span>
          <span>Resolution: <b style="color:${a.resolutionAchieved?'var(--green)':'var(--red)'};">${a.resolutionAchieved?'Achieved':'Not achieved'}</b></span>
        </div>
      </div>
      <div style="margin-top:8px;font-size:10px;color:var(--muted);text-align:right;">Powered by Claude Sonnet · Analysis completed</div>
    `;
  } catch(e) {
    resultEl.innerHTML = '<div style="color:var(--red);padding:12px;">Error: '+e.message+'</div>';
  }
}

// ─── Load recording for curated stories ───
async function loadCuratedRecording(callSid, storyId) {
  const container = document.getElementById('curated-audio-'+storyId);
  if (!container) return;
  container.innerHTML = '<div style="font-size:11px;color:var(--muted);">Loading recording...</div>';
  try {
    const call = await fetch('/api/call/'+callSid).then(r=>r.json());
    if (call.recordingUrl) {
      container.innerHTML = `
        <audio controls preload="metadata" style="width:100%;height:32px;"><source src="${call.recordingUrl}" type="audio/mpeg"></audio>
        <div style="font-size:10px;color:var(--muted);margin-top:4px;"><a href="${call.recordingUrl}" target="_blank" style="color:var(--accent);">Open in new tab</a> | <span style="cursor:pointer;color:var(--cyan);" onclick="openDetail('${callSid}')">View full call detail</span></div>
      `;
    } else {
      container.innerHTML = '<div style="font-size:12px;color:var(--muted);font-style:italic;">No recording available for this call</div>';
    }
  } catch(e) {
    container.innerHTML = '<div style="font-size:12px;color:var(--red);">Failed to load recording</div>';
  }
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();});
init();
</script>
</body>
</html>
